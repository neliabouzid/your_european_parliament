<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>{{ title }}</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/procedures.css', v='2') }}"
    />
    />
  </head>
  <body>
    <div class="navbar">
      <div
        class="container-centered"
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
          height: 100%;
        "
      >
        <a
          href="{{ url_for('index') }}"
          id="logo-link"
          style="display: flex; align-items: center"
        >
          <img
            src="{{ url_for('static', filename='images/logo.svg') }}"
            alt="YEP logo"
            class="nav-logo"
          />
        </a>

        <div class="nav-links">
          <a href="#" class="nav-link" data-page="eu">What's the EU?</a>
          <a href="#" class="nav-link" data-page="procedure"
            >What is a procedure?</a
          >

          <div class="subnav">
            <a href="javascript:void(0)" class="subnavbtn">Procedures</a>
            <div class="subnav-content">
              <a href="{{ url_for('index_positions') }}" class="nav-link"
                >Completed procedures</a
              >
              <a href="#" class="nav-link">Ongoing procedures</a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <main style="padding-top: 60px">{% block content %}{% endblock %}</main>
  </body>
</html>
